<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2322c55e'/><text y='.9em' font-size='80' x='10'>🚌</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Base SEO (overridden per-page by react-helmet-async) -->
    <title>ShuttleElite | Elite Corporate Mobility Platform</title>
    <meta name="description" content="ShuttleElite — Premium corporate ride-sharing with real-time GPS tracking, elite drivers, and enterprise security. Book your next mission now." />
    <meta name="theme-color" content="#22c55e" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph Base -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ShuttleElite" />
    <meta property="og:title" content="ShuttleElite | Elite Corporate Mobility Platform" />
    <meta property="og:description" content="Premium corporate ride-sharing with real-time GPS tracking, elite drivers, and enterprise security." />
    <meta property="og:url" content="https://shuttleelite.com" />

    <!-- Twitter Card Base -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ShuttleElite | Elite Corporate Mobility" />
    <meta name="twitter:description" content="Premium corporate ride-sharing. Real-time GPS. Enterprise security." />

    <!-- JSON-LD: Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ShuttleElite",
      "url": "https://shuttleelite.com",
      "description": "Premium corporate mobility platform providing real-time GPS tracked, elite ride-sharing for enterprise teams.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Support",
        "availableLanguage": "English"
      }
    }
    </script>

    <!-- Fonts: Deduplicated and optimized -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
